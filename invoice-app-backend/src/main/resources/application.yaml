spring:
  application:
    name: invoice-app-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/invoiceapp}
    username: ${SPRING_DATASOURCE_USERNAME:invoiceapp}
    password: ${SPRING_DATASOURCE_PASSWORD:invoiceapp}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: when-authorized
    prometheus:
      enabled: true
  metrics:
    tags:
      application: invoice-app
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET:provide_a_real_secret_key}
      expiration: 86400000